apiVersion: apps/v1
kind: Deployment
# Managed by Octopus Deploy — image and replicas patched at deploy time via yq. Build 1
metadata:
  name: argoapp
  labels:
    app: argoapp
spec:
  replicas: 10
  selector:
    matchLabels:
      app: argoapp
  template:
    metadata:
      labels:
        app: argoapp
    spec:
      containers:
        - name: argoapp
          image: kennyocto/argo:426328e
          ports:
            - containerPort: 3000
          env:
            - name: APP_ENV
              value: development
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
