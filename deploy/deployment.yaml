apiVersion: apps/v1
kind: Deployment
# Managed by Octopus Deploy — tokens resolved at deploy time. v2
metadata:
  name: argoapp
  labels:
    app: argoapp
spec:
  replicas: #{Replicas}
  selector:
    matchLabels:
      app: argoapp
  template:
    metadata:
      labels:
        app: argoapp
    spec:
      containers:
        - name: argoapp
          image: #{ImageName}:#{ImageTag}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
