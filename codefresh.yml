version: "1.0"

stages:
  - build
  - package
  - deploy

steps:

  # ── 1. Build & push Docker image ────────────────────────────────────────────
  build_image:
    title: Build Docker image
    stage: build
    type: build
    image_name: kennethbates/argoapp
    tag: "${{CF_SHORT_REVISION}}"
    dockerfile: Dockerfile
    # Remove the line below if your Dockerfile is in the repo root
    working_directory: "${{CF_VOLUME_PATH}}/${{CF_REPO_NAME}}"

  # ── 2. Run tests (add your real test command here) ───────────────────────────
  run_tests:
    title: Run tests
    stage: build
    image: kennethbates/argoapp:${{CF_SHORT_REVISION}}
    commands:
      - echo "Add your test command here e.g. npm test / pytest / dotnet test"

  # ── 3. Pack deploy/ manifests into an Octopus zip package ───────────────────
  pack_manifests:
    title: Pack manifests for Octopus
    stage: package
    image: alpine:3.19
    commands:
      - apk add --no-cache zip
      - mkdir -p /dist
      - cd deploy && zip -r /dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip .
      - echo "Packed /dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip"
    volumes:
      - name: dist
        mountPath: /dist

  # ── 4. Push package to Octopus built-in feed ────────────────────────────────
  push_to_octopus:
    title: Push package to Octopus Deploy
    stage: package
    image: octopusdeploy/octo:latest
    commands:
      - >
        octo push
        --package /dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip
        --server ${{OCTOPUS_URL}}
        --apiKey ${{OCTOPUS_API_KEY}}
        --space ${{OCTOPUS_SPACE_ID}}
    volumes:
      - name: dist
        mountPath: /dist

  # ── 5. Create and deploy an Octopus release ─────────────────────────────────
  create_octopus_release:
    title: Create & deploy Octopus release
    stage: deploy
    image: octopusdeploy/octo:latest
    commands:
      - >
        octo create-release
        --project "${{OCTOPUS_PROJECT}}"
        --packageVersion ${{CF_BUILD_ID}}.0.0
        --server ${{OCTOPUS_URL}}
        --apiKey ${{OCTOPUS_API_KEY}}
        --space ${{OCTOPUS_SPACE_ID}}
        --deployTo "${{OCTOPUS_ENVIRONMENT}}"
        --waitForDeployment
        --deploymentTimeout 00:10:00
