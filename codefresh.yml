version: "1.0"

stages:
  - build
  - deploy

steps:

  # ── 0. Clone repo ────────────────────────────────────────────────────────────
  clone:
    title: Clone repository
    type: git-clone
    repo: "${{CF_REPO_OWNER}}/${{CF_REPO_NAME}}"
    revision: "${{CF_REVISION}}"
    git: github-kenny

  # ── 1. Build & push Docker image ────────────────────────────────────────────
  build_image:
    title: Build Docker image
    stage: build
    type: build
    image_name: kennyocto/argo
    tag: "${{CF_SHORT_REVISION}}"
    dockerfile: Dockerfile
    working_directory: "${{CF_VOLUME_PATH}}/${{CF_REPO_NAME}}"
    registry: kennyocto-dockerhub

  # ── 2. Run tests ─────────────────────────────────────────────────────────────
  run_tests:
    title: Run tests
    stage: build
    image: kennyocto/argo:${{CF_SHORT_REVISION}}
    commands:
      - node test.js
    working_directory: /app

  # ── 3. Create and deploy an Octopus release ─────────────────────────────────
  create_octopus_release:
    title: Create & deploy Octopus release
    stage: deploy
    image: octopusdeploy/octo:latest
    commands:
      - |
        octo create-release \
          --project "$OCTOPUS_PROJECT" \
          --packageVersion $CF_SHORT_REVISION \
          --server $OCTOPUS_URL \
          --apiKey $OCTOPUS_API_KEY \
          --space $OCTOPUS_SPACE_ID \
          --deployTo "$OCTOPUS_ENVIRONMENT" \
          --waitForDeployment \
          --deploymentTimeout 00:10:00
