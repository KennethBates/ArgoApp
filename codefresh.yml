version: "1.0"

stages:
  - build
  - package
  - deploy

steps:

  # ── 0. Clone repo ────────────────────────────────────────────────────────────
  clone:
    title: Clone repository
    type: git-clone
    repo: "${{CF_REPO_OWNER}}/${{CF_REPO_NAME}}"
    revision: "${{CF_REVISION}}"
    git: github-kenny

  # ── 1. Build & push Docker image ────────────────────────────────────────────
  build_image:
    title: Build Docker image
    stage: build
    type: build
    image_name: kennyocto/argo
    tag: "${{CF_SHORT_REVISION}}"
    dockerfile: Dockerfile
    working_directory: "${{CF_VOLUME_PATH}}/${{CF_REPO_NAME}}"
    registry: kennyocto-dockerhub

  # ── 2. Run tests ─────────────────────────────────────────────────────────────
  run_tests:
    title: Run tests
    stage: build
    image: kennyocto/argo:${{CF_SHORT_REVISION}}
    commands:
      - node test.js
    working_directory: /app

  # ── 3. Pack deploy/ manifests into an Octopus zip package ───────────────────
  pack_manifests:
    title: Pack manifests for Octopus
    stage: package
    image: alpine:3.19
    commands:
      - apk add --no-cache zip
      - mkdir -p $CF_VOLUME_PATH/dist
      - cd $CF_VOLUME_PATH/$CF_REPO_NAME/deploy && zip -r $CF_VOLUME_PATH/dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip .
      - echo "Packed $CF_VOLUME_PATH/dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip"

  # ── 4. Push package to Octopus built-in feed ────────────────────────────────
  push_to_octopus:
    title: Push package to Octopus Deploy
    stage: package
    image: octopusdeploy/octo:latest
    commands:
      - octo push
        --package $CF_VOLUME_PATH/dist/ArgoApp.Manifests.${{CF_BUILD_ID}}.0.0.zip
        --server ${{OCTOPUS_URL}}
        --apiKey ${{OCTOPUS_API_KEY}}
        --space ${{OCTOPUS_SPACE_ID}}

  # ── 5. Create and deploy an Octopus release ─────────────────────────────────
  create_octopus_release:
    title: Create & deploy Octopus release
    stage: deploy
    image: octopusdeploy/octo:latest
    commands:
      - octo create-release
        --project "${{OCTOPUS_PROJECT}}"
        --packageVersion ${{CF_BUILD_ID}}.0.0
        --server ${{OCTOPUS_URL}}
        --apiKey ${{OCTOPUS_API_KEY}}
        --space ${{OCTOPUS_SPACE_ID}}
        --deployTo "${{OCTOPUS_ENVIRONMENT}}"
        --waitForDeployment
        --deploymentTimeout 00:10:00
