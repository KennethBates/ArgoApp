name: Publish Manifests Package to Octopus

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package version
        id: version
        # SemVer format: 1.0.<run_number> — unique per push, valid for Octopus
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3

      - name: Pack deploy/ folder into Octopus package
        run: |
          mkdir -p dist
          cd deploy
          zip -r ../dist/ArgoApp.Manifests.${{ steps.version.outputs.version }}.zip .

      - name: Push package to Octopus
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: ${{ secrets.OCTOPUS_SPACE_ID }}
        run: |
          octopus package upload \
            --package "dist/ArgoApp.Manifests.${{ steps.version.outputs.version }}.zip"
